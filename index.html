<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0520">
    <title>راديو الكرة - ULTRA LUXURY DUBAI GOLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --g1: #ffd700;
            --g2: #ffed4e;
            --g3: #fff9e6;
            --g4: #ffe666;
            --g5: #ffcc00;
            --navy: #0a0520;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: 
                radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(ellipse 80% 40% at 50% 100%, rgba(255, 215, 0, 0.2), transparent),
                linear-gradient(180deg, #0a0520 0%, #1a0a3a 50%, #0a0520 100%);
            color: var(--g3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* EXTREME GOLD EFFECTS */
        .gold-glow-1 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.4), transparent);
            top: -300px;
            left: -300px;
            animation: pulse 4s infinite;
            pointer-events: none;
            z-index: 0;
        }

        .gold-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 237, 78, 0.3), transparent);
            bottom: -300px;
            right: -300px;
            animation: pulse 5s infinite 1s;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .shimmer-line {
            position: fixed;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--g1), transparent);
            box-shadow: 0 0 50px var(--g1);
            animation: shimmer-move 3s infinite;
            pointer-events: none;
            z-index: 1;
        }

        .line-1 { top: 20%; animation-delay: 0s; }
        .line-2 { top: 40%; animation-delay: 1s; }
        .line-3 { top: 60%; animation-delay: 2s; }
        .line-4 { bottom: 20%; animation-delay: 3s; }

        @keyframes shimmer-move {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 720px;
            position: relative;
            z-index: 3;
            animation: zoomIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card {
            background: 
                linear-gradient(135deg, rgba(26, 15, 58, 0.98), rgba(42, 20, 80, 0.95)),
                linear-gradient(to bottom, rgba(255, 215, 0, 0.1), transparent, rgba(255, 215, 0, 0.05));
            border: 4px solid;
            border-image: linear-gradient(135deg, var(--g2), var(--g1), var(--g4), var(--g2)) 1;
            border-radius: 30px;
            padding: 60px 45px;
            box-shadow: 
                0 0 100px 40px rgba(255, 215, 0, 0.5),
                0 0 150px 80px rgba(255, 215, 0, 0.25),
                inset 0 0 50px rgba(255, 215, 0, 0.15),
                0 50px 100px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(40px);
            position: relative;
        }

        /* DECORATIVE CORNERS */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            opacity: 0.4;
            pointer-events: none;
            background: radial-gradient(circle, var(--g1), transparent);
            filter: drop-shadow(0 0 30px var(--g1));
            animation: spin 25s linear infinite;
        }

        .corner-tl { top: -50px; left: -50px; animation-direction: normal; }
        .corner-tr { top: -50px; right: -50px; animation-direction: reverse; }
        .corner-bl { bottom: -50px; left: -50px; animation-direction: reverse; }
        .corner-br { bottom: -50px; right: -50px; animation-direction: normal; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* GOLD LINES */
        .gold-line-thick {
            height: 6px;
            background: linear-gradient(90deg, transparent, var(--g2), var(--g1), var(--g4), var(--g2), transparent);
            margin: 18px 0;
            box-shadow: 
                0 0 40px var(--g1),
                0 0 80px rgba(255, 215, 0, 0.4),
                0 0 120px rgba(255, 237, 78, 0.2);
            border-radius: 3px;
        }

        /* QURAN SECTION */
        .quran {
            text-align: center;
            margin-bottom: 20px;
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 26px;
            color: var(--g2);
            text-shadow: 
                0 0 40px rgba(255, 237, 78, 1),
                0 0 80px rgba(255, 215, 0, 0.9),
                0 0 120px rgba(255, 215, 0, 0.6);
            margin-bottom: 11px;
            letter-spacing: 5px;
            font-weight: 700;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        }

        .ayah {
            font-family: 'Amiri', serif;
            font-size: 14px;
            color: var(--g3);
            line-height: 2.2;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            letter-spacing: 1px;
        }

        /* TITLE */
        h1 {
            font-size: 2.6em;
            color: var(--g2);
            text-shadow: 
                0 0 50px rgba(255, 237, 78, 1),
                0 0 100px rgba(255, 215, 0, 0.9),
                0 0 150px rgba(255, 215, 0, 0.5),
                0 4px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin: 18px 0;
            font-weight: 900;
            letter-spacing: 4px;
            animation: goldFlare 3s infinite;
        }

        @keyframes goldFlare {
            0%, 100% { text-shadow: 
                0 0 50px rgba(255, 237, 78, 1),
                0 0 100px rgba(255, 215, 0, 0.9),
                0 0 150px rgba(255, 215, 0, 0.5),
                0 4px 20px rgba(0, 0, 0, 0.6);
            }
            50% { text-shadow: 
                0 0 70px rgba(255, 237, 78, 1.2),
                0 0 120px rgba(255, 215, 0, 1),
                0 0 180px rgba(255, 215, 0, 0.7),
                0 4px 20px rgba(0, 0, 0, 0.6);
            }
        }

        .subtitle {
            text-align: center;
            color: var(--g2);
            font-size: 1.05em;
            margin-bottom: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        /* SELECT */
        select {
            width: 100%;
            padding: 13px 18px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.15));
            border: 3px solid var(--g1);
            border-radius: 18px;
            color: var(--g2);
            font-size: 1em;
            font-family: 'Tajawal', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                inset 0 0 30px rgba(255, 215, 0, 0.15),
                0 0 30px rgba(255, 215, 0, 0.3);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        select:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 237, 78, 0.25));
            box-shadow: 
                inset 0 0 40px rgba(255, 215, 0, 0.25),
                0 0 50px rgba(255, 215, 0, 0.5);
            transform: scale(1.02);
        }

        /* MATCHES */
        .matches {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 237, 78, 0.08));
            border: 3px solid var(--g1);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 
                inset 0 0 40px rgba(255, 215, 0, 0.12),
                0 0 40px rgba(255, 215, 0, 0.25);
        }

        .match {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.18), rgba(255, 237, 78, 0.12));
            border-right: 6px solid var(--g2);
            border-radius: 15px;
            padding: 13px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                0 0 35px rgba(255, 215, 0, 0.3),
                inset 0 0 20px rgba(255, 215, 0, 0.08);
        }

        .match:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.25), rgba(255, 237, 78, 0.18));
            transform: translateX(-10px);
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.5),
                inset 0 0 20px rgba(255, 215, 0, 0.15);
        }

        .match-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 14px;
            align-items: center;
            margin-bottom: 8px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .score {
            font-size: 1.35em;
            color: var(--g2);
            text-align: center;
            text-shadow: 0 0 35px rgba(255, 237, 78, 1);
            font-weight: 900;
            filter: drop-shadow(0 0 10px var(--g1));
        }

        .time {
            text-align: center;
            font-size: 1em;
            color: var(--g3);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            font-weight: 700;
        }

        /* STANDINGS */
        .standings {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 237, 78, 0.08));
            border: 3px solid var(--g1);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            max-height: 280px;
            overflow-y: auto;
            box-shadow: 
                inset 0 0 40px rgba(255, 215, 0, 0.12),
                0 0 40px rgba(255, 215, 0, 0.25);
        }

        .team-row {
            display: grid;
            grid-template-columns: 44px 1fr 50px 50px;
            gap: 14px;
            padding: 11px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            align-items: center;
            transition: all 0.3s;
            font-weight: 700;
        }

        .team-row:hover {
            background: rgba(255, 215, 0, 0.15);
            border-radius: 12px;
        }

        .position {
            text-align: center;
            font-weight: 900;
            color: var(--g2);
            font-size: 1.3em;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        /* BUTTONS */
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        button {
            padding: 15px;
            background: linear-gradient(135deg, var(--g2), var(--g1), var(--g4));
            color: #000;
            border: 2px solid var(--g3);
            border-radius: 18px;
            font-size: 1em;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.7),
                0 0 100px rgba(255, 237, 78, 0.4),
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 3px 5px rgba(0, 0, 0, 0.4);
            filter: drop-shadow(0 0 15px var(--g1));
        }

        button:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 0 80px rgba(255, 215, 0, 0.9),
                0 0 120px rgba(255, 237, 78, 0.5),
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        button:active {
            transform: translateY(-3px);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* STATUS */
        .status {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.15));
            border-left: 6px solid var(--g2);
            border-radius: 15px;
            padding: 13px 18px;
            margin-bottom: 16px;
            display: none;
            color: var(--g3);
            text-align: center;
            font-weight: 900;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: 1px;
        }

        .status.show {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--g2), var(--g1));
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        /* ============================================================
           AJOUT : carte "حكاية الفريق" (histoire du club) + photos archives
           ============================================================ */
        .clickable-team { cursor: pointer; transition: color .2s, text-shadow .2s; }
        .clickable-team:hover { color: var(--g2); text-shadow: 0 0 18px rgba(255,215,0,.85); }

        .team-modal {
            position: fixed; inset: 0; z-index: 50;
            display: none; align-items: flex-start; justify-content: center;
            background: rgba(5,3,20,.86); backdrop-filter: blur(10px);
            padding: 18px; overflow-y: auto;
        }
        .team-modal.open { display: flex; animation: tmFade .35s ease; }
        @keyframes tmFade { from { opacity: 0; } to { opacity: 1; } }

        .team-modal-card {
            width: 100%; max-width: 640px; margin: 14px 0;
            background: linear-gradient(135deg, rgba(26,15,58,.99), rgba(42,20,80,.97));
            border: 3px solid;
            border-image: linear-gradient(135deg, var(--g2), var(--g1), var(--g4), var(--g2)) 1;
            border-radius: 24px; padding: 30px 24px;
            box-shadow: 0 0 80px 25px rgba(255,215,0,.35), inset 0 0 40px rgba(255,215,0,.1), 0 40px 80px rgba(0,0,0,.9);
            position: relative; animation: tmZoom .45s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes tmZoom { from { transform: scale(.85) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }

        .tm-close {
            position: absolute; top: 14px; left: 14px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,215,0,.12); border: 2px solid var(--g1); color: var(--g2);
            font-size: 1.15em; font-weight: 900; cursor: pointer; line-height: 1;
        }
        .tm-close:hover { background: var(--g1); color: var(--navy); }

        .tm-head { text-align: center; margin-bottom: 10px; }
        .tm-name { font-family: 'Amiri', serif; font-size: 1.7em; font-weight: 700; color: var(--g2);
            text-shadow: 0 0 35px rgba(255,237,78,.9), 0 0 70px rgba(255,215,0,.6); letter-spacing: 2px; margin: 8px 0 4px; }
        .tm-founded { display: inline-block; margin-top: 6px; padding: 5px 16px; border: 2px solid var(--g1);
            border-radius: 30px; color: var(--g3); font-weight: 800; font-size: .9em; background: rgba(255,215,0,.08);
            box-shadow: 0 0 20px rgba(255,215,0,.25); letter-spacing: 1px; }

        .tm-photos { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .tm-frame { position: relative; padding: 8px; border-radius: 10px;
            background: linear-gradient(135deg, var(--g2), var(--g5), var(--g4));
            box-shadow: 0 10px 30px rgba(0,0,0,.7), 0 0 25px rgba(255,215,0,.4);
            transform: rotate(-2deg); }
        .tm-frame:nth-child(even) { transform: rotate(2deg); }
        .tm-frame img { display: block; width: 150px; height: 150px; object-fit: cover; border-radius: 4px;
            filter: sepia(.55) contrast(1.05) brightness(.92) saturate(.85); border: 3px solid #1a0f3a; background: #1a0f3a; }
        .tm-frame::after { content: ''; position: absolute; inset: 8px; border-radius: 4px; pointer-events: none;
            box-shadow: inset 0 0 40px rgba(40,20,5,.55); }
        .tm-cap { position: absolute; bottom: 8px; left: 8px; right: 8px; text-align: center;
            font-size: .62em; color: #f5e9c8; background: rgba(20,12,40,.55); padding: 2px; font-weight: 700; letter-spacing: 1px; }

        .tm-meta { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 14px 0; }
        .tm-meta span { padding: 6px 14px; border-radius: 12px; background: rgba(255,215,0,.07);
            border: 1px solid rgba(255,215,0,.3); color: var(--g3); font-weight: 700; font-size: .85em; }

        .tm-line { height: 4px; margin: 16px 0; border-radius: 3px;
            background: linear-gradient(90deg, transparent, var(--g2), var(--g1), var(--g4), var(--g2), transparent);
            box-shadow: 0 0 25px var(--g1); }

        .tm-story-title { text-align: center; color: var(--g2); font-weight: 900; letter-spacing: 3px;
            font-size: 1.05em; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,215,0,.6); }
        .tm-story { color: var(--g3); line-height: 2; font-size: .98em; text-align: justify;
            max-height: 240px; overflow-y: auto; padding: 4px 6px 4px 0; border-right: 3px solid rgba(255,215,0,.4); padding-right: 12px; }
        .tm-credit { text-align: center; color: rgba(255,249,230,.55); font-size: .72em; margin-top: 12px; }

        .tm-btns { display: flex; gap: 12px; margin-top: 18px; }
        .tm-btns button { flex: 1; padding: 14px; border: none; border-radius: 14px; cursor: pointer;
            font-family: 'Tajawal', sans-serif; font-weight: 900; font-size: 1em; letter-spacing: 1px;
            background: linear-gradient(135deg, var(--g2), var(--g5)); color: var(--navy);
            box-shadow: 0 6px 20px rgba(255,215,0,.5); transition: transform .2s; }
        .tm-btns button:hover { transform: translateY(-2px); }

        .tm-loading { text-align: center; padding: 44px 0; color: var(--g3); font-weight: 800; }
        .tm-spinner { width: 54px; height: 54px; margin: 0 auto 16px; border-radius: 50%;
            border: 5px solid rgba(255,215,0,.2); border-top-color: var(--g1); animation: spin 1s linear infinite; }

        /* ── Carte club enrichie : palmarès, légendes, buts ── */
        .tm-sec-title { text-align:center; color:var(--g2); font-weight:900; letter-spacing:2px; font-size:1.02em; margin:16px 0 8px; text-shadow:0 0 18px rgba(255,215,0,.55); }
        .tm-cups { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
        .tm-cups span { padding:7px 13px; border-radius:12px; font-weight:800; font-size:.85em; color:#1a0f3a; background:linear-gradient(135deg,var(--g2),var(--g5)); box-shadow:0 4px 14px rgba(255,215,0,.45); }
        .tm-legends { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
        .tm-legend { text-decoration:none; padding:7px 13px; border-radius:12px; font-weight:800; font-size:.85em; color:var(--g3); background:rgba(255,215,0,.08); border:1px solid rgba(255,215,0,.35); transition:all .2s; }
        .tm-legend:hover { background:var(--g1); color:var(--navy); }
        .tm-btns { flex-wrap:wrap; }
        .tm-btns a.tm-goals { flex:1; min-width:140px; padding:14px; border-radius:14px; text-align:center; text-decoration:none; font-weight:900; letter-spacing:1px; color:#fff; background:linear-gradient(135deg,#e11d2a,#7a0c14); box-shadow:0 6px 20px rgba(225,29,42,.5); transition:transform .2s; }
        .tm-btns a.tm-goals:hover { transform:translateY(-2px); }

        .tm-video { position:relative; width:100%; padding-bottom:56.25%; border-radius:12px; overflow:hidden; border:3px solid var(--g1); box-shadow:0 0 25px rgba(255,215,0,.35); margin-top:4px; background:#000; }
        .tm-video iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
        .tm-legends .tm-legend { cursor:default; }
    </style>
</head>
<body>
    <div class="gold-glow-1"></div>
    <div class="gold-glow-2"></div>
    <div class="shimmer-line line-1"></div>
    <div class="shimmer-line line-2"></div>
    <div class="shimmer-line line-3"></div>
    <div class="shimmer-line line-4"></div>

    <div class="container">
        <div class="card">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div class="quran">
                <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                <div class="ayah">قُلْ إِن كُنتُمْ تُحِبُّونَ اللَّهَ فَاتَّبِعُونِي يُحْبِبْكُمُ اللَّهُ</div>
            </div>

            <div class="gold-line-thick"></div>

            <h1>⚽ راديو الكرة</h1>
            <p class="subtitle">👑 الذهب النقي 24 قيراط 👑</p>

            <select id="leagueSelect">
                <option value="PL">⭐ الدوري الإنجليزي الممتاز 🇬🇧</option>
                <option value="PD">⭐ الدوري الإسباني 🇪🇸</option>
                <option value="SA">⭐ الدوري الإيطالي 🇮🇹</option>
                <option value="BL1">⭐ الدوري الألماني 🇩🇪</option>
                <option value="FL1">⭐ الدوري الفرنسي 🇫🇷</option>
            </select>

            <div class="status" id="status"></div>

            <div class="gold-line-thick"></div>

    <div class="team-modal" id="teamModal">

    <script>
        let currentLeague = 'PL';
        let matchesData = [];
        let standingsData = [];
        let currentStoryText = '';

        const leagueSelect = document.getElementById('leagueSelect');
        const matchesContainer = document.getElementById('matches');
        const standingsContainer = document.getElementById('standings');
        const readBtn = document.getElementById('readBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const status = document.getElementById('status');
        const teamModal = document.getElementById('teamModal');
        const teamModalBody = document.getElementById('teamModalBody');

        leagueSelect.addEventListener('change', (e) => {
            currentLeague = e.target.value;
            loadData();
        });

        refreshBtn.addEventListener('click', loadData);
        readBtn.addEventListener('click', readScores);

        // Clic sur un nom d'equipe (classement OU match) -> ouvre sa carte/histoire
        document.addEventListener('click', (e) => {
            const el = e.target.closest('[data-team-id]');
            if (el) openTeam(el.getAttribute('data-team-id'), el.getAttribute('data-team-name'),
                              el.getAttribute('data-team-crest'), el.getAttribute('data-team-short'));
        });
        teamModal.addEventListener('click', (e) => { if (e.target === teamModal) closeTeam(); });

        /* ============================================================
           DONNEES REELLES & A JOUR via football-data.org
           ------------------------------------------------------------
           football-data.org bloque le CORS navigateur ET exige un token
           secret => proxy Cloudflare Worker GRATUIT (worker2.js).
           1) Deploie worker2.js sur Cloudflare.
           2) Colle son URL ci-dessous, SANS slash final.
           Routes : /standings/PL   /matches/PL   /team/{id}
           Ligues : PL PD SA BL1 FL1
           ============================================================ */
        const WORKER_URL = 'https://radiofoot.lordsidhom78.workers.dev';
        const YOUTUBE_KEY = '';   // (optionnel) clé YouTube Data API v3 → vidéo intégrée. Vide = bouton recherche.

        function msg(t) {
            return '<p style="text-align:center;color:var(--g3);font-weight:800;font-size:1.05em;">' + t + '</p>';
        }
        function esc(s) {
            return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function loadData() {
            if (WORKER_URL.indexOf('VOTRE-WORKER') !== -1) {
                showStatus('⚠️ اضبط رابط الـ Worker أولاً', 'error');
                matchesContainer.innerHTML = msg('لم يتم ضبط مصدر البيانات بعد — راجع WORKER_URL');
                standingsContainer.innerHTML = msg('لم يتم ضبط مصدر البيانات بعد — راجع WORKER_URL');
                return;
            }
            try {
                showStatus('✨ جاري تحميل البيانات الحقيقية...', 'loading');
                readBtn.disabled = true;
                _matchCache = {};   // vide le cache à chaque chargement

                await Promise.all([fetchMatches(), fetchStandings()]);

                readBtn.disabled = false;
                showStatus('👑 تم تحميل البيانات بنجاح!', 'success');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
            }
        }

        // ── Saison de repli : si la "saison courante" est vide (ex: PL déjà
        //    basculée sur 2026-27 non commencée), on prend la saison précédente.
        function fallbackSeason() {
            const now = new Date();
            return (now.getUTCMonth() < 7) ? (now.getUTCFullYear() - 1) : now.getUTCFullYear();
        }

        // Cache des appels /matches (dédoublonne classement + résultats sur un même chargement)
        var _matchCache = {};
        function matchesRaw(league, season) {
            const key = league + ':' + (season || 'cur');
            if (_matchCache[key]) return _matchCache[key];
            const u = WORKER_URL + '/matches/' + league + (season ? '?season=' + season : '');
            _matchCache[key] = fetch(u)
                .then(r => r.ok ? r.json() : { matches: [] })
                .then(d => (d && d.matches) || [])
                .catch(() => []);
            return _matchCache[key];
        }

        const LIVE_STATES = ['IN_PLAY', 'PAUSED'];
        function mapMatch(m) {
            const ft = (m.score && m.score.fullTime) ? m.score.fullTime : {};
            const h = m.homeTeam || {}, a = m.awayTeam || {};
            return {
                home: h.shortName || h.name || '؟',
                away: a.shortName || a.name || '؟',
                homeId: h.id, awayId: a.id,
                homeCrest: h.crest || '', awayCrest: a.crest || '',
                homeShort: h.shortName || h.name || '', awayShort: a.shortName || a.name || '',
                homeGoals: (ft.home == null) ? '-' : ft.home,
                awayGoals: (ft.away == null) ? '-' : ft.away,
                status: LIVE_STATES.indexOf(m.status) !== -1 ? 'مباشر' : (m.status === 'FINISHED' ? 'انتهت' : 'لم تبدأ'),
                date: m.utcDate || '',
                finished: m.status === 'FINISHED', live: LIVE_STATES.indexOf(m.status) !== -1
            };
        }

        // Calcule un classement à partir des matchs terminés (3/1/0 ; départage : différence de buts puis buts pour)
        function computeTableFromMatches(rawMatches) {
            const T = {};
            function ent(team) {
                const id = team.id;
                if (!T[id]) T[id] = {
                    id: id, name: team.shortName || team.name || '؟',
                    short: team.shortName || team.name || '', crest: team.crest || '',
                    played: 0, won: 0, draw: 0, lost: 0, gf: 0, ga: 0, points: 0
                };
                return T[id];
            }
            rawMatches.forEach(m => {
                if (m.status !== 'FINISHED') return;
                const ft = (m.score && m.score.fullTime) ? m.score.fullTime : {};
                if (ft.home == null || ft.away == null || !m.homeTeam || !m.awayTeam) return;
                const H = ent(m.homeTeam), A = ent(m.awayTeam);
                H.played++; A.played++;
                H.gf += ft.home; H.ga += ft.away;
                A.gf += ft.away; A.ga += ft.home;
                if (ft.home > ft.away) { H.won++; A.lost++; H.points += 3; }
                else if (ft.home < ft.away) { A.won++; H.lost++; A.points += 3; }
                else { H.draw++; A.draw++; H.points++; A.points++; }
            });
            const arr = Object.keys(T).map(k => T[k]);
            arr.sort((x, y) =>
                y.points - x.points ||
                (y.gf - y.ga) - (x.gf - x.ga) ||
                y.gf - x.gf ||
                x.name.localeCompare(y.name)
            );
            return arr.map((t, idx) => ({
                pos: idx + 1, name: t.name, id: t.id, crest: t.crest, short: t.short,
                played: t.played, points: t.points
            }));
        }

        async function fetchMatches() {
            let raw = await matchesRaw(currentLeague);   // saison courante
            let hasResults = raw.some(m => m.status === 'FINISHED' || LIVE_STATES.indexOf(m.status) !== -1);

            // Service royal : jamais de vide. Hors-saison → on remonte les saisons précédentes.
            const y = new Date().getUTCFullYear();
            for (let s = y - 1; s >= y - 4 && !hasResults; s--) {
                raw = await matchesRaw(currentLeague, s);
                hasResults = raw.some(m => m.status === 'FINISHED' || LIVE_STATES.indexOf(m.status) !== -1);
            }

            const all = raw.map(mapMatch);
            const liveOnes = all.filter(m => m.live);
            const finished = all.filter(m => m.finished).sort((a, b) => new Date(b.date) - new Date(a.date));
            const upcoming = all.filter(m => !m.finished && !m.live).sort((a, b) => new Date(a.date) - new Date(b.date));

            matchesData = liveOnes.concat(finished).slice(0, 15);
            if (matchesData.length === 0) matchesData = upcoming.slice(0, 15);

            if (matchesData.length === 0) matchesContainer.innerHTML = msg('لا توجد مباريات حالياً');
            else displayMatches();
        }

        async function fetchStandings() {
            // 1) classement officiel de la saison courante (exact quand dispo, ex: Espagne)
            let table = [];
            try {
                const res = await fetch(WORKER_URL + '/standings/' + currentLeague);
                if (res.ok) {
                    const data = await res.json();
                    const standings = data.standings || [];
                    const blk = standings.find(s => s.type === 'TOTAL') || standings[0];
                    table = (blk && blk.table) || [];
                }
            } catch (e) {}

            const official = table.filter(t => (t.playedGames || 0) > 0);
            if (official.length) {
                standingsData = official.map(t => {
                    const tm = t.team || {};
                    return {
                        pos: t.position, name: tm.shortName || tm.name || '؟',
                        id: tm.id, crest: tm.crest || '', short: tm.shortName || tm.name || '',
                        played: t.playedGames, points: t.points
                    };
                });
            } else {
                // 2) Service royal : saison courante vide → calcul depuis les matchs, en remontant
                //    les saisons précédentes jusqu'à en trouver une jouée (jamais de classement vide).
                const y = new Date().getUTCFullYear();
                standingsData = [];
                for (let s = y - 1; s >= y - 4 && !standingsData.length; s--) {
                    const raw = await matchesRaw(currentLeague, s);
                    standingsData = computeTableFromMatches(raw);
                }
                if (!standingsData.length) {   // ultime filet : matchs de la saison courante
                    standingsData = computeTableFromMatches(await matchesRaw(currentLeague));
                }
            }

            if (standingsData.length === 0) standingsContainer.innerHTML = msg('يتعذّر تحميل الترتيب — حدّث الـ Worker');
            else displayStandings();
        }

        function teamAttrs(o, side) {
            // o = objet match ou standing ; side = '' | 'home' | 'away'
            const id = side ? o[side + 'Id'] : o.id;
            const name = side ? o[side] : o.name;
            const crest = side ? o[side + 'Crest'] : o.crest;
            const short = side ? o[side + 'Short'] : o.short;
            if (!id) return '';
            return 'class="clickable-team" data-team-id="' + esc(id) + '" data-team-name="' + esc(name) +
                   '" data-team-crest="' + esc(crest) + '" data-team-short="' + esc(short) + '"';
        }

        function displayMatches() {
            matchesContainer.innerHTML = matchesData.map(m => `
                <div class="match">
                    <div class="match-header">
                        <span ${teamAttrs(m, 'home')}>${esc(m.home)}</span>

                        <span ${teamAttrs(m, 'away')}>${esc(m.away)}</span>
                    </div>
                    <div class="time">${m.status === 'مباشر' ? '🔴 مباشر' : m.status}</div>

        }

        var currentPalmares = [];

        function youtubeSearch(q) {
            return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(q);

        var _ytListCache = {};
        // Une vidéo AU HASARD parmi les résultats (nécessite YOUTUBE_KEY). Renvoie {id,title} ou null.
        // La liste est mise en cache ; on tire au sort à chaque clic (vidéo différente sans recharger l'API).
        async function randomVideoId(query) {
            if (!YOUTUBE_KEY) return null;
            let list = _ytListCache[query];
            if (list === undefined) {
                try {
                    const u = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=15&q=' +
                              encodeURIComponent(query) + '&key=' + YOUTUBE_KEY;
                    const r = await fetch(u);
                    list = r.ok ? ((await r.json()).items || []) : [];
                } catch (e) { list = []; }
                _ytListCache[query] = list;
            }
            if (!list.length) return null;
            const it = list[Math.floor(Math.random() * list.length)];
            return (it && it.id && it.id.videoId)
                ? { id: it.id.videoId, title: (it.snippet && it.snippet.title) || '' } : null;
        }

            { k:['bayern'], ar:'بايرن ميونخ', hist:'العملاق الألماني المهيمن على البوندسليغا. توّج بدوري أبطال أوروبا ست مرات.', cups:['الدوري الألماني ×33','دوري أبطال أوروبا ×6','كأس ألمانيا ×20'], legends:['فرانتس بكنباور','غيرد مولر','توماس مولر','فيليب لام'], yt:'Bayern Munich best goals' },
            { k:['dortmund'], ar:'بوروسيا دورتموند', hist:'نادي "الحائط الأصفر" وجماهيره الأسطورية. توّج بدوري أبطال أوروبا سنة 1997.', cups:['الدوري الألماني ×8','دوري أبطال أوروبا ×1'], legends:['ماركو رويس','روبرت ليفاندوفسكي','ماتياس سامر'], yt:'Borussia Dortmund best goals' },
            { k:['leverkusen'], ar:'باير ليفركوزن', hist:'حقق إنجازاً تاريخياً بأول لقب بوندسليغا سنة 2024 دون أي هزيمة مع تشابي ألونسو.', cups:['الدوري الألماني ×1','كأس ألمانيا ×2'], legends:['ميشائيل بالاك','شتيفان كيسلينغ','فلوريان فيرتز'], yt:'Bayer Leverkusen best goals' },
            { k:['leipzig'], ar:'لايبزيغ', hist:'نادٍ صاعد بقوة في الكرة الألمانية الحديثة، فرض نفسه ضمن كبار البوندسليغا.', cups:['كأس ألمانيا ×2'], legends:['تيمو فيرنر','داني أولمو','إميل فورسبيرغ'], yt:'RB Leipzig best goals' },
            { k:['schalke'], ar:'شالكه', hist:'من الأندية الشعبية العريقة في ألمانيا بقاعدة جماهيرية كبيرة في منطقة الرور.', cups:['كأس ألمانيا ×5'], legends:['راؤول','كلاوس فيشر','ميسوت أوزيل'], yt:'Schalke 04 best goals' },

            { k:['paris','psg','saint-germain'], ar:'باريس سان جيرمان', hist:'عملاق العاصمة الفرنسية. توّج بأول لقب دوري أبطال أوروبا في تاريخه سنة 2025.', cups:['الدوري الفرنسي ×12','دوري أبطال أوروبا ×1','كأس فرنسا ×15'], legends:['زلاتان إبراهيموفيتش','كيليان مبابي','رونالدينيو','ماركو فيراتي'], yt:'PSG best goals' },
            { k:['marseille'], ar:'مارسيليا', hist:'النادي الفرنسي الوحيد الذي توّج بدوري أبطال أوروبا سنة 1993.', cups:['الدوري الفرنسي ×9','دوري أبطال أوروبا ×1'], legends:['جان بيير بابان','ديدييه دروغبا','كريس وادل'], yt:'Olympique Marseille best goals' },
            { k:['lyon'], ar:'ليون', hist:'هيمن على الدوري الفرنسي بسبعة ألقاب متتالية مطلع الألفية.', cups:['الدوري الفرنسي ×7','كأس فرنسا ×5'], legends:['جونينيو','كريم بنزيما','ألكسندر لاكازيت'], yt:'Olympique Lyonnais best goals' },
            { k:['monaco'], ar:'موناكو', hist:'نادي الإمارة، اشتهر بصناعة النجوم الشباب ومنهم كيليان مبابي.', cups:['الدوري الفرنسي ×8','كأس فرنسا ×5'], legends:['تييري هنري','كيليان مبابي','لودوفيك جيولي'], yt:'AS Monaco best goals' },
            { k:['saint-etienne','saint-étienne','etienne'], ar:'سانت إتيان', hist:'النادي الأكثر تتويجاً بالدوري الفرنسي تاريخياً بعشرة ألقاب.', cups:['الدوري الفرنسي ×10','كأس فرنسا ×6'], legends:['ميشيل بلاتيني','دومينيك روشتو','إيف كورو'], yt:'Saint-Etienne best goals' }
        ];

        function findClub(name, short) {
            const hay = (String(name || '') + ' ' + String(short || '')).toLowerCase();
            for (const c of CLUBS) {
                for (const kw of c.k) { if (hay.indexOf(kw) !== -1) return c; }
            }
            return null;
        }

        async function openTeam(id, name, crest, short) {
            window.speechSynthesis.cancel();
            currentStoryText = '';
            currentPalmares = [];
            teamModal.classList.add('open');
            teamModalBody.innerHTML =
                '<div class="tm-loading"><div class="tm-spinner"></div>جاري سرد حكاية ' + esc(name || 'الفريق') + '...</div>';

            const club = findClub(name, short);   // palmarès / joueurs cultes / requête buts

            const [metaR, storyR] = await Promise.allSettled([
                getTeamMeta(id),
                getTeamStory(short || name, name)   // présentation Wikipedia (sans citer la source)
            ]);
            const meta = metaR.status === 'fulfilled' ? metaR.value : null;
            const story = storyR.status === 'fulfilled' ? storyR.value : null;

            // Une seule vidéo : la plus regardée pour les buts du club
            const goalsQuery = (club && club.yt) || (((meta && meta.name) || name || '') + ' best goals');
            let video = null;
            try { video = await randomVideoId(goalsQuery); } catch (e) {}

            renderTeamCard({ id: id, name: name, crest: crest }, meta, club, story, video, goalsQuery);
        }

        function closeTeam() {
            window.speechSynthesis.cancel();
            teamModal.classList.remove('open');
        }

        async function getTeamMeta(id) {
            if (!id) return null;
            const res = await fetch(WORKER_URL + '/team/' + id);
            if (!res.ok) return null;
            const d = await res.json();
            return {
                name: d.name, crest: d.crest, founded: d.founded,
                colors: d.clubColors, venue: d.venue, website: d.website
            };
        }

        function cleanName(q) {
            return String(q || '')
                .replace(/\b(FC|CF|AFC|SC|AC|CD|RC|CP|BK|SK|VfL|VfB|TSG|SV|BSC|RCD|UD|SD|1\.)\b/gi, '')
                .replace(/\s+/g, ' ').trim();
        }

        async function getTeamStory(primary, secondary) {
            const tries = [primary, cleanName(primary), secondary, cleanName(secondary)]
                .filter((v, i, arr) => v && arr.indexOf(v) === i);

            for (const q of tries) {
                try {
                    const sUrl = 'https://ar.wikipedia.org/w/api.php?action=query&list=search&srsearch=' +
                                 encodeURIComponent(q) + '&srlimit=1&format=json&origin=*';
                    const sRes = await fetch(sUrl);
                    if (!sRes.ok) continue;
                    const sData = await sRes.json();
                    const hit = sData.query && sData.query.search && sData.query.search[0];
                    if (!hit) continue;

                    const sumUrl = 'https://ar.wikipedia.org/api/rest_v1/page/summary/' +
                                   encodeURIComponent(hit.title);
                    const sumRes = await fetch(sumUrl);
                    if (!sumRes.ok) continue;
                    const sum = await sumRes.json();

                    const extract = sum.extract || '';
                    if (!extract) continue;
                    return {
                        title: sum.title || hit.title,
                        extract: extract,
                        image: (sum.originalimage && sum.originalimage.source) ||
                               (sum.thumbnail && sum.thumbnail.source) || '',
                        page: (sum.content_urls && sum.content_urls.desktop && sum.content_urls.desktop.page) || ''
                    };
                } catch (e) { /* on tente la requete suivante */ }
            }
            return null;
        }

        function renderTeamCard(base, meta, club, story, video, goalsQuery) {
            const name = (story && story.title) || (club && club.ar) || (meta && meta.name) || base.name || 'الفريق';
            const founded = meta && meta.founded;
            const colors = meta && meta.colors;
            const venue = meta && meta.venue;
            const crest = base.crest || (meta && meta.crest) || '';
            const archive = (story && story.image) ? story.image : '';

            currentStoryText = (story && story.extract) || (club && club.hist) || '';
            currentPalmares = (club && club.cups) ? club.cups.slice() : [];

            let photos = '';
            if (crest) photos += '<div class="tm-frame"><img src="' + esc(crest) + '" alt=""><div class="tm-cap">الشعار</div></div>';
            if (archive) photos += '<div class="tm-frame"><img src="' + esc(archive) + '" alt=""><div class="tm-cap">من الأرشيف</div></div>';

            let meta_html = '';
            if (venue) meta_html += '<span>🏟️ ' + esc(venue) + '</span>';
            if (colors) meta_html += '<span>🎨 ' + esc(colors) + '</span>';

            let palmares = '';
            if (currentPalmares.length) {
                palmares = '<div class="tm-sec-title">🏆 الألقاب</div><div class="tm-cups">' +
                    currentPalmares.map(c => '<span>' + esc(c) + '</span>').join('') + '</div>';
            }

            let legends = '';
            if (club && club.legends && club.legends.length) {
                legends = '<div class="tm-sec-title">⭐ نجوم النادي</div><div class="tm-legends">' +
                    club.legends.map(L => '<span class="tm-legend">' + esc(L) + '</span>').join('') + '</div>';
            }

            const storyBlock = currentStoryText
                ? '<div class="tm-sec-title">📜 الحكاية</div><div class="tm-story">' + esc(currentStoryText) + '</div>'
                : '<div class="tm-sec-title">📜 الحكاية</div>' + msg('الحكاية غير متوفرة حالياً لهذا النادي');

            // Une seule vidéo (la plus regardée) intégrée ; sinon repli bouton recherche
            let videoBlock = '';
            if (video && video.id) {
                videoBlock = '<div class="tm-sec-title">⚽ أشهر الأهداف</div>' +
                    '<div class="tm-video"><iframe src="https://www.youtube.com/embed/' + esc(video.id) +
                    '" title="" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></div>';
            }
            const goalsBtn = (video && video.id) ? '' :
                '<a class="tm-goals" target="_blank" rel="noopener" href="' + esc(youtubeSearch(goalsQuery)) + '">⚽ أشهر الأهداف</a>';

            teamModalBody.innerHTML =
                '<div class="tm-head">' +
                    '<div class="tm-name">' + esc(name) + '</div>' +
                    (founded ? '<div class="tm-founded">⭐ تأسس سنة ' + esc(founded) + '</div>' : '') +
                '</div>' +
                (photos ? '<div class="tm-photos">' + photos + '</div>' : '') +
                (meta_html ? '<div class="tm-meta">' + meta_html + '</div>' : '') +
                '<div class="tm-line"></div>' +
                palmares +
                legends +
                videoBlock +
                storyBlock +
                '<div class="tm-btns">' +
                    goalsBtn +
                    '<button onclick="speakStory()" ' + (currentStoryText || currentPalmares.length ? '' : 'disabled style="opacity:.5;cursor:default;"') + '>🔊 احكِ القصة</button>' +
                    '<button onclick="closeTeam()">✖ إغلاق</button>' +
                '</div>';
        }

        function speakStory() {
            let t = currentStoryText || '';
            if (currentPalmares && currentPalmares.length) t += ' أبرز الألقاب: ' + currentPalmares.join('، ') + '.';
            if (!t.trim()) return;
            speakLong(t);
            playStadiumAmbiance();
        }

        // Lecture longue en arabe : on coupe en morceaux <=180 caracteres et on les
        // enchaine (contourne la troncature ~15s de Chrome). Pattern LORD habituel.
        function speakLong(text) {
            window.speechSynthesis.cancel();
            const chunks = [];
            let buf = '';
            text.split(/(?<=[\.!\?؟،\n])\s+/).forEach(part => {
                if ((buf + ' ' + part).length > 180) {
                    if (buf) chunks.push(buf.trim());
                    if (part.length > 180) {
                        for (let i = 0; i < part.length; i += 180) chunks.push(part.slice(i, i + 180));
                        buf = '';
                    } else buf = part;
                } else {
                    buf = buf ? buf + ' ' + part : part;
                }
            });
            if (buf.trim()) chunks.push(buf.trim());

            let i = 0;
            function next() {
                if (i >= chunks.length) return;
                const u = new SpeechSynthesisUtterance(chunks[i++]);
                u.lang = 'ar-SA';
                u.rate = 0.85;
                u.pitch = 1.05;
                u.onend = next;
                window.speechSynthesis.speak(u);
            }
            next();
        }

        /* ===================== LECTURE DES RESULTATS (inchange) ===================== */

        function readScores() {
            if (!matchesData.length) return;

            let text = `راديو الكرة الفاخرة بالذهب النقي تقدم لكم نتائج اليوم. `;
            matchesData.forEach(m => {
                text += `${m.home} ضد ${m.away}: ${m.homeGoals} ل ${m.awayGoals}. `;
            });
            text += `ترتيب الدوري الفاخر: `;
            standingsData.slice(0, 3).forEach(t => {
                text += `المركز ${t.pos}: ${t.name} برصيد ${t.points} نقطة. `;
            });

            speakText(text);
            playStadiumAmbiance();
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.80;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function playStadiumAmbiance() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 3);
            } catch (e) {}
        }

        function showStatus(msgText, type) {
            status.textContent = msgText;
            status.className = 'status show ' + type;
            if (type === 'success') setTimeout(() => status.classList.remove('show'), 3500);
        }

        window.addEventListener('load', loadData);
    </script>
