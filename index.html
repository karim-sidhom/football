<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0520">
    <title>راديو الكرة - ULTRA LUXURY DUBAI GOLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --g1: #ffd700;
            --g2: #ffed4e;
            --g3: #fff9e6;
            --g4: #ffe666;
            --g5: #ffcc00;
            --navy: #0a0520;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: 
                radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(ellipse 80% 40% at 50% 100%, rgba(255, 215, 0, 0.2), transparent),
                linear-gradient(180deg, #0a0520 0%, #1a0a3a 50%, #0a0520 100%);
            color: var(--g3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* EXTREME GOLD EFFECTS */
        .gold-glow-1 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.4), transparent);
            top: -300px;
            left: -300px;
            animation: pulse 4s infinite;
            pointer-events: none;
            z-index: 0;
        }

        .gold-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 237, 78, 0.3), transparent);
            bottom: -300px;
            right: -300px;
            animation: pulse 5s infinite 1s;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .shimmer-line {
            position: fixed;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--g1), transparent);
            box-shadow: 0 0 50px var(--g1);
            animation: shimmer-move 3s infinite;
            pointer-events: none;
            z-index: 1;
        }

        .line-1 { top: 20%; animation-delay: 0s; }
        .line-2 { top: 40%; animation-delay: 1s; }
        .line-3 { top: 60%; animation-delay: 2s; }
        .line-4 { bottom: 20%; animation-delay: 3s; }

        @keyframes shimmer-move {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 720px;
            position: relative;
            z-index: 3;
            animation: zoomIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.8) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .card {
            background: 
                linear-gradient(135deg, rgba(26, 15, 58, 0.98), rgba(42, 20, 80, 0.95)),
                linear-gradient(to bottom, rgba(255, 215, 0, 0.1), transparent, rgba(255, 215, 0, 0.05));
            border: 4px solid;
            border-image: linear-gradient(135deg, var(--g2), var(--g1), var(--g4), var(--g2)) 1;
            border-radius: 30px;
            padding: 60px 45px;
            box-shadow: 
                0 0 100px 40px rgba(255, 215, 0, 0.5),
                0 0 150px 80px rgba(255, 215, 0, 0.25),
                inset 0 0 50px rgba(255, 215, 0, 0.15),
                0 50px 100px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(40px);
            position: relative;
        }

        /* DECORATIVE CORNERS */
        .corner {
            position: absolute;
            width: 150px;
            height: 150px;
            opacity: 0.4;
            pointer-events: none;
            background: radial-gradient(circle, var(--g1), transparent);
            filter: drop-shadow(0 0 30px var(--g1));
            animation: spin 25s linear infinite;
        }

        .corner-tl { top: -75px; left: -75px; animation-direction: normal; }
        .corner-tr { top: -75px; right: -75px; animation-direction: reverse; }
        .corner-bl { bottom: -75px; left: -75px; animation-direction: reverse; }
        .corner-br { bottom: -75px; right: -75px; animation-direction: normal; }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* GOLD LINES */
        .gold-line-thick {
            height: 6px;
            background: linear-gradient(90deg, transparent, var(--g2), var(--g1), var(--g4), var(--g2), transparent);
            margin: 35px 0;
            box-shadow: 
                0 0 40px var(--g1),
                0 0 80px rgba(255, 215, 0, 0.4),
                0 0 120px rgba(255, 237, 78, 0.2);
            border-radius: 3px;
        }

        /* QURAN SECTION */
        .quran {
            text-align: center;
            margin-bottom: 35px;
        }

        .bismillah {
            font-family: 'Amiri', serif;
            font-size: 36px;
            color: var(--g2);
            text-shadow: 
                0 0 40px rgba(255, 237, 78, 1),
                0 0 80px rgba(255, 215, 0, 0.9),
                0 0 120px rgba(255, 215, 0, 0.6);
            margin-bottom: 18px;
            letter-spacing: 5px;
            font-weight: 700;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        }

        .ayah {
            font-family: 'Amiri', serif;
            font-size: 18px;
            color: var(--g3);
            line-height: 2.2;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            letter-spacing: 1px;
        }

        /* TITLE */
        h1 {
            font-size: 4.5em;
            color: var(--g2);
            text-shadow: 
                0 0 50px rgba(255, 237, 78, 1),
                0 0 100px rgba(255, 215, 0, 0.9),
                0 0 150px rgba(255, 215, 0, 0.5),
                0 4px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin: 30px 0;
            font-weight: 900;
            letter-spacing: 4px;
            animation: goldFlare 3s infinite;
        }

        @keyframes goldFlare {
            0%, 100% { text-shadow: 
                0 0 50px rgba(255, 237, 78, 1),
                0 0 100px rgba(255, 215, 0, 0.9),
                0 0 150px rgba(255, 215, 0, 0.5),
                0 4px 20px rgba(0, 0, 0, 0.6);
            }
            50% { text-shadow: 
                0 0 70px rgba(255, 237, 78, 1.2),
                0 0 120px rgba(255, 215, 0, 1),
                0 0 180px rgba(255, 215, 0, 0.7),
                0 4px 20px rgba(0, 0, 0, 0.6);
            }
        }

        .subtitle {
            text-align: center;
            color: var(--g2);
            font-size: 1.4em;
            margin-bottom: 40px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        /* SELECT */
        select {
            width: 100%;
            padding: 20px 30px;
            margin-bottom: 35px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.15));
            border: 3px solid var(--g1);
            border-radius: 18px;
            color: var(--g2);
            font-size: 1.15em;
            font-family: 'Tajawal', sans-serif;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                inset 0 0 30px rgba(255, 215, 0, 0.15),
                0 0 30px rgba(255, 215, 0, 0.3);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        select:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.3), rgba(255, 237, 78, 0.25));
            box-shadow: 
                inset 0 0 40px rgba(255, 215, 0, 0.25),
                0 0 50px rgba(255, 215, 0, 0.5);
            transform: scale(1.02);
        }

        /* MATCHES */
        .matches {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 237, 78, 0.08));
            border: 3px solid var(--g1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            max-height: 480px;
            overflow-y: auto;
            box-shadow: 
                inset 0 0 40px rgba(255, 215, 0, 0.12),
                0 0 40px rgba(255, 215, 0, 0.25);
        }

        .match {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.18), rgba(255, 237, 78, 0.12));
            border-right: 6px solid var(--g2);
            border-radius: 15px;
            padding: 20px;
            margin: 18px 0;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                0 0 35px rgba(255, 215, 0, 0.3),
                inset 0 0 20px rgba(255, 215, 0, 0.08);
        }

        .match:hover {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.25), rgba(255, 237, 78, 0.18));
            transform: translateX(-10px);
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.5),
                inset 0 0 20px rgba(255, 215, 0, 0.15);
        }

        .match-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 25px;
            align-items: center;
            margin-bottom: 12px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .score {
            font-size: 1.8em;
            color: var(--g2);
            text-align: center;
            text-shadow: 0 0 35px rgba(255, 237, 78, 1);
            font-weight: 900;
            filter: drop-shadow(0 0 10px var(--g1));
        }

        .time {
            text-align: center;
            font-size: 1em;
            color: var(--g3);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            font-weight: 700;
        }

        /* STANDINGS */
        .standings {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 237, 78, 0.08));
            border: 3px solid var(--g1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 35px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 
                inset 0 0 40px rgba(255, 215, 0, 0.12),
                0 0 40px rgba(255, 215, 0, 0.25);
        }

        .team-row {
            display: grid;
            grid-template-columns: 50px 1fr 55px 55px;
            gap: 25px;
            padding: 18px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.2);
            align-items: center;
            transition: all 0.3s;
            font-weight: 700;
        }

        .team-row:hover {
            background: rgba(255, 215, 0, 0.15);
            border-radius: 12px;
        }

        .position {
            text-align: center;
            font-weight: 900;
            color: var(--g2);
            font-size: 1.3em;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        /* BUTTONS */
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        button {
            padding: 22px;
            background: linear-gradient(135deg, var(--g2), var(--g1), var(--g4));
            color: #000;
            border: 2px solid var(--g3);
            border-radius: 18px;
            font-size: 1.15em;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                0 0 60px rgba(255, 215, 0, 0.7),
                0 0 100px rgba(255, 237, 78, 0.4),
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 3px 5px rgba(0, 0, 0, 0.4);
            filter: drop-shadow(0 0 15px var(--g1));
        }

        button:hover {
            transform: translateY(-6px);
            box-shadow: 
                0 0 80px rgba(255, 215, 0, 0.9),
                0 0 120px rgba(255, 237, 78, 0.5),
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        button:active {
            transform: translateY(-3px);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* STATUS */
        .status {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 237, 78, 0.15));
            border-left: 6px solid var(--g2);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: none;
            color: var(--g3);
            text-align: center;
            font-weight: 900;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            letter-spacing: 1px;
        }

        .status.show {
            display: block;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 215, 0, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--g2), var(--g1));
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="gold-glow-1"></div>
    <div class="gold-glow-2"></div>
    <div class="shimmer-line line-1"></div>
    <div class="shimmer-line line-2"></div>
    <div class="shimmer-line line-3"></div>
    <div class="shimmer-line line-4"></div>

    <div class="container">
        <div class="card">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div class="quran">
                <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                <div class="ayah">قُلْ إِن كُنتُمْ تُحِبُّونَ اللَّهَ فَاتَّبِعُونِي يُحْبِبْكُمُ اللَّهُ</div>
            </div>

            <div class="gold-line-thick"></div>

            <h1>⚽ راديو الكرة</h1>
            <p class="subtitle">👑 الذهب النقي 24 قيراط 👑</p>

            <select id="leagueSelect">
                <option value="PL">⭐ الدوري الإنجليزي الممتاز 🇬🇧</option>
                <option value="PD">⭐ الدوري الإسباني 🇪🇸</option>
                <option value="SA">⭐ الدوري الإيطالي 🇮🇹</option>
                <option value="BL1">⭐ الدوري الألماني 🇩🇪</option>
                <option value="FL1">⭐ الدوري الفرنسي 🇫🇷</option>
            </select>

            <div class="status" id="status"></div>

            <div class="gold-line-thick"></div>

            <h3 style="margin-top: 30px; margin-bottom: 20px; font-size: 1.4em; color: var(--g2); text-align: center; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 25px rgba(255, 215, 0, 0.6);">🎙️ المباريات المباشرة الفاخرة</h3>
            <div class="matches" id="matches">
                <p style="text-align: center; color: var(--g3); font-weight: 800; font-size: 1.05em;">جاري التحميل...</p>
            </div>

            <h3 style="margin-bottom: 20px; font-size: 1.4em; color: var(--g2); text-align: center; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 25px rgba(255, 215, 0, 0.6);">🏆 الترتيب الفاخر</h3>
            <div class="standings" id="standings">
                <p style="text-align: center; color: var(--g3); font-weight: 800; font-size: 1.05em;">جاري التحميل...</p>
            </div>

            <div class="gold-line-thick"></div>

            <div class="buttons">
                <button id="readBtn" disabled>🔊 اقرأ النتائج</button>
                <button id="refreshBtn">🔄 تحديث فوري</button>
            </div>
        </div>
    </div>

    <script>
        let currentLeague = 'PL';
        let matchesData = [];
        let standingsData = [];

        const leagueSelect = document.getElementById('leagueSelect');
        const matchesContainer = document.getElementById('matches');
        const standingsContainer = document.getElementById('standings');
        const readBtn = document.getElementById('readBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const status = document.getElementById('status');

        leagueSelect.addEventListener('change', (e) => {
            currentLeague = e.target.value;
            loadData();
        });

        refreshBtn.addEventListener('click', loadData);
        readBtn.addEventListener('click', readScores);

        const API_KEY = '4b4e5fc41d0e4f1c81a87c5ff9579eef';
        const BASE_URL = 'https://api.football-data.org/v4';

        async function loadData() {
            try {
                showStatus('✨ جاري تحميل البيانات الحقيقية...', 'loading');
                readBtn.disabled = true;

                await Promise.all([fetchMatches(), fetchStandings()]);

                readBtn.disabled = false;
                showStatus('👑 تم تحميل البيانات بنجاح!', 'success');
            } catch (err) {
                showStatus('❌ خطأ: ' + err.message, 'error');
            }
        }

        async function fetchMatches() {
            const today = new Date();
            const from = new Date(today);
            from.setDate(today.getDate() - 3);
            const to = new Date(today);
            to.setDate(today.getDate() + 1);

            const fmt = d => d.toISOString().split('T')[0];

            const res = await fetch(`${BASE_URL}/competitions/${currentLeague}/matches?dateFrom=${fmt(from)}&dateTo=${fmt(to)}`, {
                headers: { 'X-Auth-Token': API_KEY }
            });

            if (!res.ok) throw new Error('فشل تحميل المباريات');
            const data = await res.json();

            matchesData = (data.matches || []).map(m => ({
                home: m.homeTeam.shortName || m.homeTeam.name,
                away: m.awayTeam.shortName || m.awayTeam.name,
                homeGoals: m.score.fullTime.home ?? '-',
                awayGoals: m.score.fullTime.away ?? '-',
                status: m.status === 'IN_PLAY' ? 'مباشر' : m.status === 'FINISHED' ? 'انتهت' : 'قادمة',
                minute: m.minute || ''
            }));

            if (matchesData.length === 0) {
                matchesContainer.innerHTML = '<p style="text-align:center;color:var(--g3);font-weight:800;">لا توجد مباريات في هذه الفترة</p>';
            } else {
                displayMatches();
            }
        }

        async function fetchStandings() {
            const res = await fetch(`${BASE_URL}/competitions/${currentLeague}/standings`, {
                headers: { 'X-Auth-Token': API_KEY }
            });

            if (!res.ok) throw new Error('فشل تحميل الترتيب');
            const data = await res.json();

            const table = data.standings?.[0]?.table || [];
            standingsData = table.map(t => ({
                pos: t.position,
                name: t.team.shortName || t.team.name,
                played: t.playedGames,
                points: t.points
            }));

            displayStandings();
        }

        function displayMatches() {
            matchesContainer.innerHTML = matchesData.map(m => `
                <div class="match">
                    <div class="match-header">
                        <span>${m.home}</span>
                        <span class="score">${m.homeGoals} - ${m.awayGoals}</span>
                        <span>${m.away}</span>
                    </div>
                    <div class="time">${m.status === 'مباشر' ? m.minute + "'" : 'انتهت'}</div>
                </div>
            `).join('');
        }

        function displayStandings() {
            standingsContainer.innerHTML = `
                <div class="team-row" style="border-bottom: 3px solid var(--g1); font-weight: 900; color: var(--g2);">
                    <div class="position">👑</div>
                    <div>الفريق</div>
                    <div style="text-align: center;">⚽</div>
                    <div style="text-align: center;">💯</div>
                </div>
                ${standingsData.map(t => `
                    <div class="team-row">
                        <div class="position">${t.pos}</div>
                        <div style="font-weight: 800;">${t.name}</div>
                        <div style="text-align: center; font-weight: 800;">${t.played}</div>
                        <div style="text-align: center; color: var(--g2); font-weight: 900; font-size: 1.2em; text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);">${t.points}</div>
                    </div>
                `).join('')}
            `;
        }

        function readScores() {
            if (!matchesData.length) return;

            let text = `راديو الكرة الفاخرة بالذهب النقي تقدم لكم نتائج اليوم. `;
            matchesData.forEach(m => {
                text += `${m.home} ضد ${m.away}: ${m.homeGoals} ل ${m.awayGoals}. `;
            });
            text += `ترتيب الدوري الفاخر: `;
            standingsData.slice(0, 3).forEach(t => {
                text += `المركز ${t.pos}: ${t.name} برصيد ${t.points} نقطة. `;
            });

            speakText(text);
            playStadiumAmbiance();
        }

        function speakText(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.80;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        function playStadiumAmbiance() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 3);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 3);
            } catch (e) {}
        }

        function showStatus(msg, type) {
            status.textContent = msg;
            status.className = 'status show ' + type;
            if (type === 'success') setTimeout(() => status.classList.remove('show'), 3500);
        }

        window.addEventListener('load', loadData);
    </script>
</body>
</html>
